name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update RunPod template (if configured)
        if: ${{ vars.RUNPOD_TEMPLATE_ID != '' }}
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          TEMPLATE_ID: ${{ vars.RUNPOD_TEMPLATE_ID }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          echo "Patching RunPod template ${TEMPLATE_ID} to use ${IMAGE_TAG}"
          curl -sf -X PATCH "https://rest.runpod.io/v1/templates/${TEMPLATE_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageName\":\"${IMAGE_TAG}\"}" | tee /dev/stderr

      - name: Bounce endpoint workers (if configured)
        if: ${{ vars.RUNPOD_ENDPOINT_ID != '' }}
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_ENDPOINT_ID }}
        run: |
          # PATCH workers to 0 then back to 3 to force a rolling restart with the new image
          curl -sf -X PATCH "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"workersMax":0}' >/dev/null
          sleep 5
          curl -sf -X PATCH "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"workersMax":3}' >/dev/null
          echo "Endpoint ${ENDPOINT_ID} bounced."
